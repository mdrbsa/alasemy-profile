<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>محمد حمد العاصمي</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap');
    
    body {
      font-family: 'Cairo', sans-serif;
      background: linear-gradient(135deg, #0f0c08, #1c1810);
      color: #fff;
      margin: 0;
      padding: 20px;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    
    .profile {
      background: rgba(20, 18, 15, 0.95);
      backdrop-filter: blur(15px);
      border-radius: 28px;
      padding: 45px 35px;
      width: 100%;
      max-width: 460px;
      text-align: center;
      border: 1px solid #d4af37;
      box-shadow: 0 20px 40px rgba(212, 175, 55, 0.15);
    }
    
    .avatar {
      width: 170px;
      height: 170px;
      border-radius: 50%;
      border: 6px solid #d4af37;
      margin-bottom: 25px;
      object-fit: cover;
      box-shadow: 0 10px 30px rgba(212, 175, 55, 0.3);
    }
    
    h1 { margin: 10px 0 8px; font-size: 29px; font-weight: 700; }
    
    .title {
      color: #d4af37;
      font-size: 19px;
      margin-bottom: 25px;
      letter-spacing: 1px;
    }
    
    .bio {
      line-height: 1.85;
      color: #e8d8b0;
      margin-bottom: 40px;
      font-size: 16.5px;
    }
    
    .links {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    
    .link {
      background: rgba(212, 175, 55, 0.1);
      color: #fff;
      padding: 17px;
      border-radius: 16px;
      text-decoration: none;
      font-weight: 600;
      transition: all 0.4s;
      border: 1px solid rgba(212, 175, 55, 0.2);
    }
    
    .link:hover {
      background: #d4af37;
      color: #000;
      transform: translateY(-5px);
      box-shadow: 0 10px 20px rgba(212, 175, 55, 0.3);
    }
  </style>
</head>
<body>
  <div class="profile">
    <img src="https://i.ibb.co/CjGsjGT/image.jpg" alt="محمد حمد العاصمي" class="avatar">
